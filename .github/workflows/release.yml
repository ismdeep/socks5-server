name: Release
on:
  push:

jobs:
  release:
    name: Release on GitHub
    runs-on: ubuntu-latest
    steps:

      - name: Check out code
        uses: actions/checkout@v1

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ismdeep
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Release socks5-server-builder-deb-amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --pull --push \
            -t ismdeep/socks5-server-builder-deb-amd64:latest \
            -f socks5-server-builder-deb-amd64.dockerfile .

      - name: Docker Release socks5-server-builder-deb-arm64
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --pull --push \
            -t ismdeep/socks5-server-builder-deb-arm64:latest \
            -f socks5-server-builder-deb-arm64.dockerfile .

      - name: Docker Release socks5-server-builder-rpm-amd64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --pull --push \
            -t ismdeep/socks5-server-builder-rpm-amd64:latest \
            -f socks5-server-builder-rpm-amd64.dockerfile .

      - name: Docker Release socks5-server-builder-rpm-arm64
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --pull --push \
            -t ismdeep/socks5-server-builder-rpm-arm64:latest \
            -f socks5-server-builder-rpm-arm64.dockerfile .

      - name: Docker Release socks5-server
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --pull --push \
            -t ismdeep/socks5-server:latest \
            -f Dockerfile .
