name: Release

on:
  push:

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install packaging toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev

      - name: Build
        run: make build

      - name: Resolve Docker tags
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "DOCKER_TAGS=${{ secrets.DOCKER_USERNAME }}/socks5-server:${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          else
            echo "DOCKER_TAGS=${{ secrets.DOCKER_USERNAME }}/socks5-server:latest" >> "${GITHUB_ENV}"
          fi

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Publish Docker image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_TAGS }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
